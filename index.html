<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Orbit</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="ship-app">
      <section class="space-viewport" id="spaceViewport" tabindex="0" aria-label="우주선 시점 사진 별자리">
        <canvas id="starCanvas" aria-hidden="true"></canvas>
        <canvas id="constellationCanvas" aria-hidden="true"></canvas>
        <div class="memory-space" id="memorySpace"></div>

        <div class="crosshair" aria-hidden="true">
          <span></span>
          <span></span>
        </div>

        <header class="ship-hud ship-hud--top">
          <div>
            <p class="eyebrow">Our Orbit</p>
            <h1>우리 둘만의 우주 항해</h1>
          </div>
          <div class="flight-stats" aria-live="polite">
            <span id="memoryCount">0개의 순간</span>
            <span id="activeDate">대기 중</span>
            <span id="shipPosition">X 0 · Y 0 · Z 0</span>
          </div>
        </header>

        <aside class="control-dock" aria-label="사진 업로드와 항해 조작">
          <div class="dock-copy">
            <p class="eyebrow">Flight Deck</p>
            <h2>사진 별자리 만들기</h2>
            <p>WASD로 이동, 마우스 드래그로 시점 회전, 휠로 전진/후진합니다.</p>
          </div>

          <form class="upload-panel" id="uploadForm">
            <label class="drop-zone" id="dropZone" for="photoInput">
              <input id="photoInput" type="file" accept="image/*" required />
              <span class="drop-zone__preview" id="photoPreview"></span>
              <span class="drop-zone__icon">+</span>
              <span class="drop-zone__text" id="fileName">사진 선택 또는 드래그</span>
            </label>

            <div class="field-grid">
              <label>
                기록한 사람
                <select id="ownerInput" required>
                  <option value="나">나</option>
                  <option value="여자친구">여자친구</option>
                  <option value="우리">우리</option>
                </select>
              </label>
              <label>
                날짜
                <input id="dateInput" type="date" required />
                <small class="field-hint" id="photoDateHint">사진 정보에 촬영일이 있으면 자동 입력됩니다.</small>
              </label>
            </div>

            <label>
              한 줄 기억
              <input
                id="captionInput"
                type="text"
                maxlength="60"
                placeholder="예: 처음 같이 별을 보던 밤"
              />
            </label>

            <button type="submit">우주에 사진 띄우기</button>
          </form>

          <div class="navigation-bar">
            <label class="time-control">
              <span>시간 워프</span>
              <input id="timeSlider" type="range" min="0" max="0" value="0" />
            </label>
            <div class="button-grid">
              <button id="playButton" type="button">자동 순항</button>
              <button id="seedButton" type="button">테스트 100개</button>
              <button id="clearButton" type="button">전체 삭제</button>
            </div>
          </div>
        </aside>

        <article class="current-memory" id="currentMemory" aria-live="polite">
          <p class="eyebrow">Current Signal</p>
          <h2>가까운 사진 신호가 없습니다.</h2>
          <p>사진을 향해 이동하면 이곳에 현재 바라보는 기억이 표시됩니다.</p>
        </article>

        <section class="mission-log" aria-label="날짜순 사진 목록">
          <div class="mission-log__header">
            <p class="eyebrow">Constellation Log</p>
            <h2>날짜순 좌표</h2>
          </div>
          <div class="timeline" id="timeline"></div>
        </section>

        <div class="empty-state" id="emptyState">
          <p class="eyebrow">No Signal</p>
          <h2>사진을 올리면 우주 공간에 첫 좌표가 생깁니다.</h2>
          <p>초기 테스트용 사진 100개는 자동으로 준비되어 있습니다.</p>
        </div>

        <div class="cockpit" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </section>
    </main>

    <template id="memoryNodeTemplate">
      <article class="memory-node" role="button" tabindex="0">
        <span class="node-glow" aria-hidden="true"></span>
        <img alt="" />
        <div class="node-caption">
          <span class="node-date"></span>
          <strong></strong>
        </div>
      </article>
    </template>

    <template id="timelineItemTemplate">
      <article class="log-row">
        <button class="log-row__select" type="button">
          <img alt="" />
          <span>
            <small class="memory-card__date"></small>
            <strong></strong>
            <em></em>
          </span>
        </button>
        <button class="log-row__delete" type="button" aria-label="사진 삭제">삭제</button>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
